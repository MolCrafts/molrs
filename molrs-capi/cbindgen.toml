language = "C"
include_guard = "MOLRS_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Do not modify. */"
tab_width = 4
style = "both"
cpp_compat = true
documentation = false

[defines]
"feature = f64" = "MOLRS_F64"

[export]
prefix = ""
exclude = ["CStore", "SimBoxKey", "FFKey"]

[export.rename]

[enum]
rename_variants = "QualifiedScreamingSnakeCase"

[fn]
rename_args = "None"

[parse]
parse_deps = false
